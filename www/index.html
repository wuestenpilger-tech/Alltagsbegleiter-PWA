<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#46131d">
<title>Alltagsbegleiter</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<script src="alltagsbegleiter-view.js"></script>
<style>
:root{--parch:#eee3cb;--paper:#f8f1e2;--wine:#67202d;--wine2:#46131d;--gold:#d4b36c;--ink:#30271d;--muted:#6c5f50;--line:#d6c39c}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--parch),#dfcba5);font-family:Georgia,'Times New Roman',serif;color:var(--ink);display:flex;align-items:center;justify-content:center;padding:18px}
.card{width:min(760px,100%);background:var(--paper);border:1px solid var(--line);border-radius:26px;padding:26px;text-align:center;box-shadow:0 12px 34px #3b2a1d22}
.seal{width:76px;height:76px;margin:0 auto 12px;border-radius:50%;background:var(--gold);color:var(--wine2);display:flex;align-items:center;justify-content:center;font-size:40px}
h1{margin:0;color:var(--wine2);font-size:38px}p{color:var(--muted);line-height:1.5}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
a,button{border:0;border-radius:16px;min-height:56px;padding:14px;font:inherit;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.primary{background:var(--wine);color:white}.secondary{background:var(--gold);color:var(--wine2)}.small{display:block;margin-top:14px;color:var(--muted);font-size:12px}
@media(max-width:560px){.buttons{grid-template-columns:1fr}h1{font-size:31px}.card{padding:20px}}
</style><script src="native-alarm.js"></script><link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head>
<body><section class="card">
<div class="seal">✝</div>
<h1>Alltagsbegleiter</h1>
<p>Eine gemeinsame Version für Tablet und Handy. Alle Daten und Apps bleiben identisch und werden über dieselbe Sicherungsdatei übertragen.</p>
<div class="buttons">
<a class="primary" href="tablet.html">📲 Tablet-Version öffnen</a>
<a class="secondary" href="handy.html">📱 Handy-Version öffnen</a>
<button id="installPwa" class="secondary" style="display:none;width:100%;margin-top:12px">⬇ Alltagsbegleiter installieren</button>
</div>
<span class="small" id="autoText">Die passende Ansicht wird gleich automatisch geöffnet …</span>
</section>
<script>
let deferredInstallPrompt=null;
const installButton=document.getElementById('installPwa');
window.addEventListener('beforeinstallprompt',event=>{event.preventDefault();deferredInstallPrompt=event;installButton.style.display='flex';});
installButton.addEventListener('click',async()=>{if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();await deferredInstallPrompt.userChoice;deferredInstallPrompt=null;installButton.style.display='none';});
window.addEventListener('appinstalled',()=>{installButton.style.display='none';});
const view=AlltagsbegleiterView.current;
autoText.textContent='Erkannte Ansicht: '+(view==='handy'?'Handy':'Tablet')+'. Automatischer Start in 1,5 Sekunden.';
setTimeout(()=>location.href=view==='handy'?'handy.html':'tablet.html',1500);
</script>
<script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
