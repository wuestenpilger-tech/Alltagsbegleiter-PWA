<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Abendabschluss</title><script src="shared-store.js"></script>
<style>
:root{--parch:#eee3cb;--paper:#f8f1e2;--cream:#fffaf0;--wine:#67202d;--wine2:#46131d;--line:#d6c39c}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#30202c,#17131a);font-family:Georgia,'Times New Roman',serif;color:#fff8e8;min-height:100vh}
header{position:relative;padding:28px 18px;text-align:center}.back{position:absolute;left:14px;top:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff15;color:white;text-decoration:none}
main{padding:14px;max-width:700px;margin:auto}.card{background:#fffaf0;color:#30271d;border-radius:18px;padding:16px}label{display:block;color:var(--wine2);font-weight:700;margin:14px 0 6px}textarea{width:100%;min-height:100px;border:1px solid var(--line);border-radius:12px;padding:12px;font:inherit;background:var(--paper)}
button{width:100%;margin-top:14px;border:0;border-radius:999px;padding:13px;background:var(--wine);color:white;font-weight:700}
.msg{margin-top:10px;color:#405735}
</style><script src="alltagsbegleiter-sync.js"></script><link rel="stylesheet" href="motorola-g55-mobile.css"><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head><body><header><a class="back" href="index.html">←</a><h1>🌙 Abendabschluss</h1><p>Drei ruhige Fragen</p></header>
<main><section class="card"><label>Wofür bin ich heute dankbar?</label><textarea id="q1"></textarea><label>Was möchte ich Gott anvertrauen?</label><textarea id="q2"></textarea><label>Was nehme ich mit in den morgigen Tag?</label><textarea id="q3"></textarea><button id="save">Im Lebensbuch speichern</button><div class="msg" id="msg"></div></section></main>
<script>
const KEY='digitales_kloster.lebensbuch.v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return []}}
document.getElementById('save').onclick=()=>{const a=load(),text='Dankbar für:\\n'+document.getElementById('q1').value+'\\n\\nAnvertraut:\\n'+document.getElementById('q2').value+'\\n\\nFür morgen:\\n'+document.getElementById('q3').value;a.push({title:'Abendabschluss',type:'Persönlicher Moment',date:new Date().toISOString().slice(0,10),text,at:new Date().toISOString()});localStorage.setItem(KEY,JSON.stringify(a));document.getElementById('msg').textContent='Im Lebensbuch gespeichert.'};
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
