<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skriptorium</title><script src="shared-store.js"></script><style>
:root{
 --parch:#eee3cb;--parch2:#e4d4b3;--paper:#f8f1e2;--ink:#30271d;--muted:#6c5f50;
 --wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--gold2:#d4b36c;--sage:#617058;
 --wood:#5d3d2a;--night:#172033;--line:#d6c39c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
a{text-decoration:none;color:inherit}

header{position:relative;background:linear-gradient(135deg,var(--wine2),var(--wine));color:#fff8e8;padding:34px 22px;text-align:center}
header h1{font-size:42px;margin:0 0 6px} header p{margin:0;color:#eadbc1}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20}
main{max-width:900px;margin:auto;padding:24px 18px 60px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
textarea,input,select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fffaf0;padding:12px;font:inherit;color:var(--ink)}
textarea{min-height:180px;resize:vertical} .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:0;border-radius:999px;padding:12px 17px;font-weight:700;cursor:pointer}
.primary{background:var(--wine);color:#fff} .secondary{background:var(--parch2);color:var(--wine2)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.entry{border-left:4px solid var(--gold);padding:12px 14px;background:#fffaf0;border-radius:10px;margin:10px 0}
.entry h3{margin:0 0 4px;color:var(--wine2)} .meta{font-size:12px;color:var(--muted);margin-bottom:8px}
@media(max-width:600px){.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">

<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}

<body><header><a class="back" href="index.html">←</a><h1>✍️ Skriptorium</h1><p>Dein persönliches geistliches und alltägliches Tagebuch</p></header>
<main>
<section class="card"><div class="row"><input id="title" placeholder="Überschrift"><select id="type">
<option>Allgemein</option><option>Lectio Divina</option><option>Gebet</option><option>Meditation</option><option>Reiki</option><option>Gesundheit</option>
</select></div><textarea id="text" placeholder="Was möchtest du heute festhalten?"></textarea>
<div class="actions"><button class="primary" id="save">Eintrag speichern</button><button class="secondary" id="export">Tagebuch exportieren</button></div></section>
<section class="card"><h2>Einträge</h2><div id="entries"></div></section>
</main>
<script>
const KEY='digitales_kloster.skriptorium.v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function saveAll(v){localStorage.setItem(KEY,JSON.stringify(v));render()}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){
 const box=document.getElementById('entries'),arr=load();box.innerHTML=arr.length?'':'<p>Noch keine Einträge.</p>';
 arr.slice().reverse().forEach((e,ri)=>{
  const i=arr.length-1-ri,d=document.createElement('div');d.className='entry';
  d.innerHTML='<h3>'+esc(e.title||e.type)+'</h3><div class="meta">'+new Date(e.at).toLocaleString('de-DE')+' · '+esc(e.type)+'</div><div>'+esc(e.text).replace(/\n/g,'<br>')+'</div><div class="actions"><button class="secondary" data-del="'+i+'">Löschen</button></div>';
  box.appendChild(d);
 });
}
document.getElementById('save').onclick=()=>{
 const t=document.getElementById('text');if(!t.value.trim())return;
 const a=load();a.push({title:document.getElementById('title').value.trim(),type:document.getElementById('type').value,text:t.value.trim(),at:new Date().toISOString()});
 saveAll(a);t.value='';document.getElementById('title').value='';
};
document.addEventListener('click',e=>{if(e.target.dataset.del!==undefined){const a=load();a.splice(Number(e.target.dataset.del),1);saveAll(a)}});
document.getElementById('export').onclick=()=>{
 const b=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
 a.href=u;a.download='Skriptorium_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
};
render();
</script>
<script>
(function(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR)return;
 const area=document.querySelector('textarea');
 if(!area)return;
 const btn=document.createElement('button');
 btn.type='button';btn.textContent='🎤 Spracheingabe';
 btn.style.cssText='border:0;border-radius:999px;padding:10px 15px;margin:8px 8px 8px 0;background:#3f5c68;color:white;font-weight:700;';
 area.parentNode.insertBefore(btn,area);
 let rec=null,active=false;
 btn.onclick=()=>{if(active&&rec){rec.stop();return}rec=new SR();rec.lang='de-DE';rec.interimResults=true;rec.continuous=false;let base=area.value;rec.onstart=()=>{active=true;btn.textContent='■ Aufnahme stoppen'};rec.onresult=e=>{let final='',interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?final+=t:interim+=t}area.value=(base+(base?' ':'')+final+interim).trim()};rec.onend=()=>{active=false;btn.textContent='🎤 Spracheingabe'};rec.onerror=()=>{active=false;btn.textContent='🎤 Spracheingabe'};rec.start()};
})();
</script>
