<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Schatzkammer 2.0</title><script src="shared-store.js"></script><style>
:root{
 --parch:#eee3cb;--parch2:#e5d4b1;--paper:#f8f1e2;--ink:#30271d;--muted:#6c5f50;
 --wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--gold2:#d4b36c;--sage:#617058;
 --wood:#5d3d2a;--night:#172033;--line:#d6c39c;--cream:#fffaf0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
a{text-decoration:none;color:inherit}

header{position:relative;background:linear-gradient(135deg,#6a5120,var(--gold));color:#fff8e8;padding:34px 22px;text-align:center}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20}
header h1{font-size:40px;margin:0 0 6px}header p{margin:0;color:#f0e4c6}
main{max-width:900px;margin:auto;padding:24px 18px 60px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--cream);font:inherit;margin-bottom:10px}
textarea{min-height:130px}button{border:0;border-radius:999px;padding:11px 16px;background:var(--gold);color:#fff;font-weight:700;cursor:pointer}
.item{background:var(--cream);border-left:4px solid var(--gold);padding:13px;border-radius:10px;margin:10px 0}
.item b{display:block;color:var(--wine2);margin-bottom:4px}.meta{color:var(--muted);font-size:12px;margin-bottom:7px}
</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">

<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head>
<body><header><a class="back" href="index.html">←</a><h1>🏛️ Schatzkammer</h1><p>Lieblingsstellen, Gebete, Zitate und persönliche Schätze</p></header>
<main><section class="card"><input id="title" placeholder="Titel"><select id="type"><option>Bibelstelle</option><option>Gebet</option><option>Zitat</option><option>Notiz</option></select><textarea id="text" placeholder="Inhalt"></textarea><button id="save">In die Schatzkammer legen</button></section>
<section class="card"><h2>Meine Schätze</h2><div id="list"></div></section></main>
<script>
const KEY='digitales_kloster.schatzkammer.v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return []}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){const a=load(),box=document.getElementById('list');box.innerHTML=a.length?'':'<p>Noch keine Einträge.</p>';a.slice().reverse().forEach((x,ri)=>{const i=a.length-1-ri,d=document.createElement('div');d.className='item';d.innerHTML='<b>'+esc(x.title||x.type)+'</b><div class="meta">'+esc(x.type)+' · '+new Date(x.at).toLocaleDateString('de-DE')+'</div><div>'+esc(x.text).replace(/\n/g,'<br>')+'</div><p><button data-del="'+i+'">Entfernen</button></p>';box.appendChild(d)})}
document.getElementById('save').onclick=()=>{const t=document.getElementById('text');if(!t.value.trim())return;const a=load();a.push({title:document.getElementById('title').value.trim(),type:document.getElementById('type').value,text:t.value.trim(),at:new Date().toISOString()});localStorage.setItem(KEY,JSON.stringify(a));t.value='';document.getElementById('title').value='';render()};
document.addEventListener('click',e=>{if(e.target.dataset.del!==undefined){const a=load();a.splice(Number(e.target.dataset.del),1);localStorage.setItem(KEY,JSON.stringify(a));render()}});
render();
</script>
<script>
(function(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR)return;
 const area=document.querySelector('textarea');
 if(!area)return;
 const btn=document.createElement('button');
 btn.type='button';btn.textContent='🎤 Spracheingabe';
 btn.style.cssText='border:0;border-radius:999px;padding:10px 15px;margin:8px 8px 8px 0;background:#3f5c68;color:white;font-weight:700;';
 area.parentNode.insertBefore(btn,area);
 let rec=null,active=false;
 btn.onclick=()=>{if(active&&rec){rec.stop();return}rec=new SR();rec.lang='de-DE';rec.interimResults=true;rec.continuous=false;let base=area.value;rec.onstart=()=>{active=true;btn.textContent='■ Aufnahme stoppen'};rec.onresult=e=>{let final='',interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?final+=t:interim+=t}area.value=(base+(base?' ':'')+final+interim).trim()};rec.onend=()=>{active=false;btn.textContent='🎤 Spracheingabe'};rec.onerror=()=>{active=false;btn.textContent='🎤 Spracheingabe'};rec.start()};
})();
</script>
<script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
