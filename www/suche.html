<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8">

<title>Suche · Alltagsbegleiter 6.0</title><script src="shared-store.js"></script>
<style>
:root{--parch:#eee3cb;--paper:#f8f1e2;--wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--ink:#30271d;--muted:#6c5f50;--line:#d6c39c}
*{box-sizing:border-box}body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif}
header{position:relative;background:linear-gradient(135deg,var(--wine2),var(--wine));color:white;padding:32px 20px;text-align:center}
header h1{margin:0 0 6px;font-size:40px}.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20;color:white;text-decoration:none}
main{max-width:900px;margin:auto;padding:22px 18px 60px}
input{width:100%;padding:15px 18px;border:1px solid var(--line);border-radius:999px;background:#fffaf0;font:inherit;font-size:18px}
.results{margin-top:18px;display:grid;gap:10px}.item{background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:14px;text-decoration:none;color:var(--ink)}
.item b{display:block;color:var(--wine2);font-size:18px;margin-bottom:3px}.item span{color:var(--muted);font-size:13px}
</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">

  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));

</head><body>
<header><a class="back" href="index.html">←</a><h1>Suche</h1><p>Apps und Klosterbereiche finden</p></header>
<main><input id="q" placeholder="z. B. Rosenkranz, Blutdruck, Lectio, Wecker …" autofocus>
<div class="results" id="results"></div></main>
<script>
const items=[
['Kapelle','Stundenbücher, Gebete, Rosenkranz und Kreuzweg','andachtsschrank.html'],
['Bibliothek','Lectio Divina und Bibellesepläne','spirituelle-bibliothek/index.html'],
['Kartäuser-Stundenbuch','Matutin und Tagesoffizien','kartaeuser-stundenbuch/index.html'],
['Stundenbuch','Laudes, Vesper und Komplet','stundenbuch_tablet.html'],
['Lectio Divina','Lesejahre A, B und C','spirituelle-bibliothek/index.html'],
['Bibelleseplan 2026–2028','Täglicher Bibelleseplan','bibelleseplan_26-28_tablet.html'],
['Bibelleseplan 2028–2030','Fortsetzung des Bibelleseplans','bibelleseplan_28-30_tablet.html'],
['Rosenkranz','Geführtes Rosenkranzgebet','Rosenkranz-Tablet.html'],
['Barmherzigkeitsrosenkranz','Gebet zur Göttlichen Barmherzigkeit','Barmherzigkeitsrosenkranz-Tablet.html'],
['Kreuzweg','Stationen und Betrachtungen','Kreuzweg_App_tablet.html'],
['Tagesgebete','Gebete für den Tageslauf','Tagesgebete.html'],
['Dankgebete','Dank, Fürbitte und Vergebung','Dankgebete.html'],
['Gebete & Lebensregeln','Morgen- und Abendgebete','Gebete-und-Lebensregeln.html'],
['Reiki-Tagesritual','Tägliche Reiki-Praxis','reiki_tagesritual_tablet.html'],
['Klangschale','Meditation und Timer','Klangschale-Tablet.html'],
['Nordic Walking','Strecken und Training','nordicwalking-tablet.html'],
['Trainings-Schrank','Trainingszentrale','trainings-schrank.html'],
['Trainingscheck','Tagesform und Belastung','trainingscheck-tablet.html'],
['Blutdruck','Messungen und Verlauf','blutdruck-app-tablet.html'],
['Gewicht','Körperwerte und Verlauf','gewicht-tablet.html'],
['Apnoe-Tracker','Schlafapnoe und Symptome','apnoe-tracker-tablet.html'],
['Energiezähler','Strom und Heizungswerte','energiezaehler_tablet.html'],
['Wecker & Timer','Klosterglocke und Timer','Wecker-Tablet.html'],
['Skriptorium','Tagebuch und Notizen','skriptorium.html'],
['Refektorium','Trinken, Fasten und Rezepte','refektorium.html'],
['Heute','Tagesübersicht','heute.html'],
['Bibliothek 2.0','Schrift, Liturgie und eigene Sammlungen','bibliothek-v10.html'],
['Lebensbuch','Chronik und Meilensteine','lebensbuch.html'],
['Pilgerarchiv','Klöster, Kirchen und Wege','pilgerarchiv.html'],
['Schatzkammer 2.0','Lieblingsstellen, Gebete und Zitate','schatzkammer.html'],
['Vorsorgezentrum','Gesundheitswerte, Medikamente und Termine','vorsorgezentrum.html'],
['Medikamente','Plan, Dosierung und Einnahme','medikamente.html'],
['Arzttermine','Termine und Fragen','arzttermine.html'],
['Laborwerte','Befunde und Referenzwerte','laborwerte.html'],
['Impfungen','Dokumentation und Auffrischung','impfungen.html'],
['Notfallpass','Wichtige Angaben für den Ernstfall','notfallpass.html'],
['Komfortzentrum','Sicherung, Jahresbuch und Spracheingabe','komfortzentrum.html'],
['Verschlüsselte Sicherung','Passwortgeschützter Export und Import','sicherung-v10.html'],
['Jahresbuch','Chronik drucken oder als PDF speichern','jahresbuch.html'],
['Aufgaben','Einmalige und wiederkehrende Aufgaben','aufgaben.html'],['Start','Persönliche Steuerzentrale','index.html'],['Synchronisation','Tablet und Handy übertragen','synchronisation.html'],['Native Erinnerungen','Android-Alarme bei geschlossener App','erinnerungen-native.html'],['Tools','Sicherung und System','index-system.html']
];
const q=document.getElementById('q'),box=document.getElementById('results');
function render(){
 const s=q.value.trim().toLowerCase();
 const arr=s?items.filter(x=>(x[0]+' '+x[1]).toLowerCase().includes(s)):items;
 box.innerHTML='';
 arr.forEach(x=>{const a=document.createElement('a');a.href=x[2];a.className='item';a.innerHTML='<b>'+x[0]+'</b><span>'+x[1]+'</span>';box.appendChild(a)});
}
q.addEventListener('input',render);render();
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
