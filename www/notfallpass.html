<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notfallpass</title><script src="shared-store.js"></script><style>
:root{
 --parch:#eee3cb;--parch2:#e5d4b1;--paper:#f8f1e2;--ink:#30271d;--muted:#6c5f50;
 --wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--gold2:#d4b36c;--sage:#617058;
 --wood:#5d3d2a;--night:#172033;--line:#d6c39c;--cream:#fffaf0;--rose:#9b4b4b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
a{text-decoration:none;color:inherit}

header{position:relative;background:linear-gradient(135deg,#8f3030,#5f1c1c);color:#fff8e8;padding:34px 22px;text-align:center}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20}
main{max-width:850px;margin:auto;padding:24px 18px 60px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--cream);font:inherit;margin-bottom:10px}
textarea{min-height:110px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:0;border-radius:999px;padding:11px 16px;background:#8f3030;color:#fff;font-weight:700}
.preview{background:var(--cream);border-left:5px solid #8f3030;padding:15px;border-radius:10px;line-height:1.6}
@media(max-width:650px){.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head>
<body><header><a class="back" href="vorsorgezentrum.html">←</a><h1>🆘 Notfallpass</h1><p>Wichtige Informationen für den Ernstfall</p></header>
<main><section class="card"><div class="row"><input id="name" placeholder="Name"><input id="blood" placeholder="Blutgruppe"></div><input id="contact" placeholder="Notfallkontakt / Telefonnummer"><textarea id="conditions" placeholder="Wichtige Erkrankungen oder Hinweise"></textarea><textarea id="allergies" placeholder="Allergien / Unverträglichkeiten"></textarea><textarea id="meds" placeholder="Wichtige Medikamente"></textarea><button id="save">Notfallpass speichern</button></section>
<section class="card"><h2>Übersicht</h2><div class="preview" id="preview"></div></section></main>
<script>
const KEY='digitales_kloster.notfallpass.v1',ids=['name','blood','contact','conditions','allergies','meds'];
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return {}}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){const d=load();ids.forEach(id=>document.getElementById(id).value=d[id]||'');document.getElementById('preview').innerHTML='<b>Name:</b> '+esc(d.name||'—')+'<br><b>Blutgruppe:</b> '+esc(d.blood||'—')+'<br><b>Notfallkontakt:</b> '+esc(d.contact||'—')+'<br><br><b>Erkrankungen/Hinweise:</b><br>'+esc(d.conditions||'—').replace(/\n/g,'<br>')+'<br><br><b>Allergien:</b><br>'+esc(d.allergies||'—').replace(/\n/g,'<br>')+'<br><br><b>Medikamente:</b><br>'+esc(d.meds||'—').replace(/\n/g,'<br>')}
document.getElementById('save').onclick=()=>{const d={};ids.forEach(id=>d[id]=document.getElementById(id).value);localStorage.setItem(KEY,JSON.stringify(d));render()};
render();
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
