<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Termine & Geburtstage · Alltagsbegleiter</title><script src="shared-store.js"></script><style>:root{--p:#eee3cb;--paper:#f8f1e2;--c:#fffaf0;--w:#67202d;--w2:#46131d;--blue:#3f5c68;--line:#d6c39c;--muted:#6c5f50}*{box-sizing:border-box}body{margin:0;background:var(--p);font-family:Georgia,serif;color:#30271d}header{position:relative;background:linear-gradient(135deg,var(--blue),var(--w2));color:white;padding:32px;text-align:center}.back{position:absolute;left:16px;top:16px;width:44px;height:44px;border-radius:50%;background:#ffffff20;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center}main{max-width:950px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--c);font:inherit;margin-bottom:10px}textarea{min-height:90px}button{border:0;border-radius:999px;padding:11px 15px;background:var(--blue);color:white;font-weight:700}.item{background:var(--c);border-left:4px solid var(--blue);padding:13px;border-radius:10px;margin:9px 0}.meta{color:var(--muted);font-size:12px}@media(max-width:700px){.grid,.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head><body><header><a class="back" href="vorsorgezentrum.html">←</a><h1>📅 Termine & Geburtstage</h1><p>Einmalig oder wiederkehrend</p></header><main><div class="grid"><section class="card"><h2>Termin</h2><div class="row"><input id="date" type="date"><input id="time" type="time"></div><input id="doctor" placeholder="Termin / Person / Ort"><input id="reason" placeholder="Anlass"><select id="recurrence"><option value="none">Einmalig</option><option value="daily">Täglich</option><option value="weekly">Wöchentlich</option><option value="monthly">Monatlich</option><option value="yearly">Jährlich</option></select><textarea id="notes" placeholder="Notizen"></textarea><button id="saveAppointment">Termin speichern</button></section><section class="card"><h2>Geburtstag</h2><input id="birthName" placeholder="Name"><div class="row"><input id="birthDate" type="date"><input id="birthYear" type="number" min="1900" max="2100" placeholder="Geburtsjahr"></div><button id="saveBirthday">Geburtstag speichern</button></section></div><section class="card"><h2>Termine</h2><div id="appointments"></div></section><section class="card"><h2>Geburtstage</h2><div id="birthdays"></div></section></main><script>
(() => {
  'use strict';
  const AK='digitales_kloster.arzttermine.v1', BK='alltagsbegleiter.geburtstage.v1';
  const $=id=>document.getElementById(id);
  const el={date:$('date'),time:$('time'),doctor:$('doctor'),reason:$('reason'),recurrence:$('recurrence'),notes:$('notes'),saveAppointment:$('saveAppointment'),birthName:$('birthName'),birthDate:$('birthDate'),birthYear:$('birthYear'),saveBirthday:$('saveBirthday'),appointments:$('appointments'),birthdays:$('birthdays')};
  let editAppointment=-1, editBirthday=-1;
  function load(k){try{const v=JSON.parse(localStorage.getItem(k)||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
  function store(k,v){localStorage.setItem(k,JSON.stringify(v));window.dispatchEvent(new Event('storage'));}
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function clearAppointment(){el.doctor.value='';el.reason.value='';el.notes.value='';el.time.value='';el.recurrence.value='none';editAppointment=-1;el.saveAppointment.textContent='Termin speichern';}
  function clearBirthday(){el.birthName.value='';el.birthYear.value='';editBirthday=-1;el.saveBirthday.textContent='Geburtstag speichern';}
  function render(){
    const a=load(AK),b=load(BK);el.appointments.innerHTML='';el.birthdays.innerHTML='';
    if(!a.length)el.appointments.innerHTML='<p>Noch keine Termine.</p>';
    a.forEach((x,i)=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<b>${esc(x.doctor||x.reason||'Termin')}</b><div class="meta">${esc(x.date)} ${esc(x.time||'')} · ${esc(x.recurrence||'none')}</div><div>${esc(x.reason||'')} ${esc(x.notes||'')}</div><p><button type="button" data-aedit="${i}">Bearbeiten</button> <button type="button" data-adel="${i}">Entfernen</button></p>`;el.appointments.appendChild(d)});
    if(!b.length)el.birthdays.innerHTML='<p>Noch keine Geburtstage.</p>';
    b.forEach((x,i)=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<b>${esc(x.name)}</b><div class="meta">${esc(x.date)} · Geburtsjahr ${esc(x.birthYear||'—')}</div><p><button type="button" data-bedit="${i}">Bearbeiten</button> <button type="button" data-bdel="${i}">Entfernen</button></p>`;el.birthdays.appendChild(d)});
  }
  const today=new Date().toISOString().slice(0,10);el.date.value=today;el.birthDate.value=today;
  el.saveAppointment.addEventListener('click',()=>{
    if(!el.date.value){alert('Bitte ein Datum auswählen.');return;}
    if(!el.doctor.value.trim()&&!el.reason.value.trim()){alert('Bitte Termin, Person, Ort oder Anlass eintragen.');el.doctor.focus();return;}
    const a=load(AK),item={date:el.date.value,time:el.time.value,doctor:el.doctor.value.trim(),reason:el.reason.value.trim(),notes:el.notes.value.trim(),recurrence:el.recurrence.value,type:'Termin',updatedAt:new Date().toISOString()};
    if(editAppointment>=0)a[editAppointment]=item;else a.push(item);store(AK,a);clearAppointment();render();alert('Termin wurde gespeichert.');
  });
  el.saveBirthday.addEventListener('click',()=>{
    if(!el.birthName.value.trim()){alert('Bitte einen Namen eintragen.');el.birthName.focus();return;}
    const b=load(BK),item={name:el.birthName.value.trim(),date:el.birthDate.value,birthYear:el.birthYear.value||el.birthDate.value.slice(0,4),type:'Geburtstag',recurrence:'yearly',updatedAt:new Date().toISOString()};
    if(editBirthday>=0)b[editBirthday]=item;else b.push(item);store(BK,b);clearBirthday();render();alert('Geburtstag wurde gespeichert.');
  });
  document.addEventListener('click',e=>{
    const ae=e.target.closest('[data-aedit]'),ad=e.target.closest('[data-adel]'),be=e.target.closest('[data-bedit]'),bd=e.target.closest('[data-bdel]');
    if(ae){const i=Number(ae.dataset.aedit),x=load(AK)[i];if(!x)return;editAppointment=i;el.date.value=x.date||today;el.time.value=x.time||'';el.doctor.value=x.doctor||'';el.reason.value=x.reason||'';el.notes.value=x.notes||'';el.recurrence.value=x.recurrence||'none';el.saveAppointment.textContent='Änderungen speichern';window.scrollTo({top:0,behavior:'smooth'});}
    if(ad){const i=Number(ad.dataset.adel);if(confirm('Diesen Termin wirklich entfernen?')){const a=load(AK);a.splice(i,1);store(AK,a);render();}}
    if(be){const i=Number(be.dataset.bedit),x=load(BK)[i];if(!x)return;editBirthday=i;el.birthName.value=x.name||'';el.birthDate.value=x.date||today;el.birthYear.value=x.birthYear||'';el.saveBirthday.textContent='Änderungen speichern';window.scrollTo({top:0,behavior:'smooth'});}
    if(bd){const i=Number(bd.dataset.bdel);if(confirm('Diesen Geburtstag wirklich entfernen?')){const b=load(BK);b.splice(i,1);store(BK,b);render();}}
  });
  render();
})();
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
