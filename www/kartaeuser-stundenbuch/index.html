<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#5c1a24">
<title>Kartäuser-Stundenbuch</title>
<script src="../shared-store.js"></script>
<style>
:root{
  --paper:#f4ecd8;--deep:#ead9b8;--maroon:#7a2432;--maroon-deep:#5c1a24;
  --gold:#a9822f;--gold-light:#c9a54d;--ink:#3a2c1e;--muted:#5a4a38;--rule:#c9b489;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;min-height:100vh}
.hero{position:relative;text-align:center;padding:42px 24px 34px;background:linear-gradient(180deg,var(--maroon-deep),var(--maroon));color:#fff8ea}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:#fff8ea;text-decoration:none;font-size:21px}
.cross{font-size:34px;color:var(--gold-light);margin-bottom:6px}
h1{font-size:42px;margin:0 0 7px}
.hero p{margin:0 auto;max-width:650px;color:#eadcc1;font-size:16px;line-height:1.5}
main{max-width:900px;margin:0 auto;padding:28px 22px 60px}
.today{background:var(--deep);border:1px solid var(--gold);border-radius:17px;padding:18px;margin-bottom:26px}
.today h2{margin:0 0 8px;color:var(--maroon-deep)}
.today p{margin:0 0 14px;color:var(--muted)}
.today-actions{display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-block;text-decoration:none;border-radius:999px;padding:10px 15px;font-weight:700}
.primary{background:var(--maroon-deep);color:#fff8ea}
.secondary{background:#fff8ea;color:var(--maroon-deep);border:1px solid var(--rule)}
.week{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.day{background:#fff8ea;border:1px solid var(--rule);border-radius:14px;padding:17px}
.day.current{outline:3px solid rgba(169,130,47,.35);border-color:var(--gold)}
.day h3{margin:0 0 10px;color:var(--maroon-deep);font-size:22px}
.links{display:flex;gap:8px;flex-wrap:wrap}
.links a,.missing{display:inline-block;padding:8px 11px;border-radius:9px;font-size:14px;text-decoration:none}
.links a{background:var(--deep);color:var(--maroon-deep);border:1px solid var(--gold)}
.links a:hover{background:#fff3d9}
.missing{background:#eee6d5;color:#8b806d;border:1px dashed var(--rule)}
.note{margin-top:25px;padding:16px 18px;border-left:4px solid var(--gold);background:var(--deep);color:var(--muted);line-height:1.5}
@media(max-width:650px){.week{grid-template-columns:1fr}h1{font-size:35px}}
</style>
<script src="../alltagsbegleiter-sync.js"></script><script src="../native-alarm.js"></script><link rel="stylesheet" href="../alltagsbegleiter-stability.css">
</head>
<body>
<header class="hero">
<a class="back" href="../andachtsschrank.html">←</a>
<div class="cross">✝</div>
<h1>Kartäuser-Stundenbuch</h1>
<p>Matutin und Tagesoffizium nach Wochentagen geordnet. Der heutige Tag und die passende Gebetszeit werden automatisch hervorgehoben.</p>
</header>
<main>
<section class="today">
<h2 id="todayTitle">Heute</h2>
<p id="todayText"></p>
<div class="today-actions" id="todayActions"></div>
</section>

<div class="week" id="weekGrid"></div>

<div class="note">
Matutin und Tagesoffizium sind jetzt für alle sieben Wochentage vollständig hinterlegt.
</div>
</main>
<script>
const days=[
 {name:'Sonntag',matutin:'matutin_sonntag.html',day:'sonntag.html'},
 {name:'Montag',matutin:'matutin_montag.html',day:'montag.html'},
 {name:'Dienstag',matutin:'matutin_dienstag.html',day:'dienstag.html'},
 {name:'Mittwoch',matutin:'matutin_mittwoch.html',day:'mittwoch.html'},
 {name:'Donnerstag',matutin:'matutin_donnerstag.html',day:'donnerstag.html'},
 {name:'Freitag',matutin:'matutin_freitag.html',day:'freitag.html'},
 {name:'Samstag',matutin:'matutin_samstag.html',day:'samstag.html'}
];
const now=new Date(),di=now.getDay(),hour=now.getHours(),today=days[di];
document.getElementById('todayTitle').textContent='Heute · '+today.name;
document.getElementById('todayText').textContent=hour<6?'Matutin ist jetzt die naheliegende Gebetszeit.':hour<12?'Morgenstunden: Laudes oder Prim passen jetzt gut.':hour<15?'Mittagszeit: Sext ist jetzt die passende Hore.':hour<18?'Nachmittag: Non ist jetzt passend.':hour<21?'Abend: Vesper ist jetzt passend.':'Nacht: Komplet oder Matutin.';
const acts=document.getElementById('todayActions');
const m=document.createElement('a');m.href=today.matutin;m.className='btn primary';m.textContent='Matutin öffnen';acts.appendChild(m);
if(today.day){const d=document.createElement('a');d.href=today.day;d.className='btn secondary';d.textContent='Tagesoffizium öffnen';acts.appendChild(d)}
const grid=document.getElementById('weekGrid');
days.forEach((x,i)=>{
 const c=document.createElement('section');c.className='day'+(i===di?' current':'');
 c.innerHTML='<h3>'+x.name+'</h3><div class="links"><a href="'+x.matutin+'">Matutin</a>'+(x.day?'<a href="'+x.day+'">Tagesoffizium</a>':'<span class="missing">Tagesoffizium noch offen</span>')+'</div>';
 grid.appendChild(c);
});
</script>
<script src="../android-file-bridge.js"></script>
<script src="../alltagsbegleiter-stability.js"></script>
</body>
</html>
