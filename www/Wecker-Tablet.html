<style>
  :root{
    --bg:#E9E3D5;
    --card:#F7F2E8;
    --border:#D5CCB9;
    --text:#211F1A;
    --muted:#655F55;
    --accent:#B8862E;
    --accent-dim:#8F6528;
    --green:#5F7355;
    --red:#7B2E3B;
    --font-mono:'JetBrains Mono', monospace;
    --font-body:'EB Garamond', serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  button, input, select{touch-action:manipulation;font-family:inherit;}
  .app{max-width:780px;margin:0 auto;min-height:100vh;padding:36px 28px 50px;}

  /* Digitaluhr */
  .clock-card{
    background:var(--card);border:1px solid var(--border);border-radius:24px;
    padding:26px 20px;text-align:center;margin-bottom:18px;box-shadow:0 3px 14px rgba(33,31,26,.06);
  }
  .clock-time{font-family:var(--font-mono);font-size:104px;font-weight:700;letter-spacing:.02em;line-height:1;}
  .clock-time .sec{font-size:46px;color:var(--muted);}
  .clock-date{font-size:23px;color:var(--muted);margin-top:12px;}

  .section{
    background:var(--card);border:1px solid var(--border);border-radius:22px;
    padding:20px;margin-bottom:18px;box-shadow:0 3px 14px rgba(33,31,26,.05);
  }
  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .section-title{font-family:var(--font-mono);font-size:19px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);}

  .toggle{width:64px;height:34px;border-radius:999px;position:relative;border:none;cursor:pointer;background:var(--border);}
  .toggle.on{background:var(--green);}
  .toggle .knob{position:absolute;top:4px;left:4px;width:26px;height:26px;border-radius:50%;background:var(--text);transition:transform .15s;}
  .toggle.on .knob{transform:translateX(30px);}

  .time-input{
    width:100%;font-family:var(--font-mono);font-size:52px;font-weight:700;text-align:center;
    background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);
    padding:10px;
  }
  .time-input:focus{outline:none;border-color:var(--accent);}

  .timer-inputs{display:flex;gap:10px;align-items:center;justify-content:center;}
  .timer-inputs input{
    width:140px;font-family:var(--font-mono);font-size:52px;font-weight:700;text-align:center;
    background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:10px 4px;
  }
  .timer-inputs input:focus{outline:none;border-color:var(--accent);}
  .timer-inputs .colon{font-family:var(--font-mono);font-size:46px;color:var(--muted);}
  .timer-labels{display:flex;gap:10px;justify-content:center;margin-top:4px;}
  .timer-labels span{width:140px;text-align:center;font-size:17px;color:var(--muted);}
  .timer-labels .colon-space{width:16px;}

  .timer-display{
    font-family:var(--font-mono);font-size:88px;font-weight:700;text-align:center;
    margin:6px 0 2px;display:none;
  }
  .timer-display.active{display:block;}

  .sound-row{display:flex;gap:8px;margin-top:14px;}
  .sound-btn{
    flex:1;padding:16px 10px;border-radius:11px;border:1.5px solid var(--border);
    background:var(--bg);color:var(--muted);font-size:21px;cursor:pointer;
  }
  .sound-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(184,134,46,0.10);}
  .preview-btn{
    background:none;border:none;color:var(--muted);font-size:18px;text-decoration:underline;
    cursor:pointer;padding:8px 0 0;display:block;margin:0 auto;
  }

  .action-row{display:flex;gap:10px;margin-top:16px;}
  .action-btn{
    flex:1;padding:18px;border-radius:12px;border:none;font-family:var(--font-mono);
    font-size:21px;font-weight:700;cursor:pointer;
  }
  .action-btn.primary{background:var(--accent);color:var(--bg);}
  .action-btn.ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);}

  .status-line{font-size:19px;color:var(--muted);text-align:center;margin-top:12px;min-height:17px;}
  .status-line.armed{color:var(--green);}

  /* Alarm-Overlay */
  .alarm-overlay{
    position:fixed;inset:0;background:rgba(18,26,44,0.94);z-index:50;
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;
  }
  .alarm-overlay.active{display:flex;}
  .alarm-icon{font-size:110px;margin-bottom:18px;animation:shake 1s ease-in-out infinite;}
  @keyframes shake{0%,100%{transform:rotate(0);}20%{transform:rotate(-12deg);}40%{transform:rotate(10deg);}60%{transform:rotate(-8deg);}80%{transform:rotate(6deg);}}
  .alarm-title{font-family:var(--font-mono);font-size:42px;font-weight:700;margin-bottom:8px;}
  .alarm-sub{font-size:24px;color:var(--muted);margin-bottom:42px;}
  .alarm-stop{
    background:var(--red);color:#fff;border:none;border-radius:999px;
    padding:22px 60px;font-family:var(--font-mono);font-size:24px;font-weight:700;cursor:pointer;
  }
  .hint{font-size:17px;color:var(--muted);text-align:center;line-height:1.5;margin-top:4px;}

  .back-to-system{position:fixed;top:18px;left:18px;z-index:80;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(30,42,68,.10);color:#1E2A44;text-decoration:none;font-size:21px;box-shadow:0 2px 10px rgba(33,31,26,.10)}
  .back-to-system:active{transform:scale(.94)}
  .eyebrow{text-align:center;font-family:var(--font-mono);font-size:12px;letter-spacing:.17em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}

  .back-to-menu{
    position:fixed;top:18px;left:18px;z-index:80;width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:21px;
    background:rgba(30,42,68,.12);color:#1E2A44;border:1px solid rgba(30,42,68,.18);
    box-shadow:0 2px 8px rgba(18,26,44,.10)
  }
</style>

<div class="app">
  <div class="eyebrow">Alltagsschrank · Zeit & Erinnerung</div>

  <div class="clock-card">
    <div class="clock-time" id="clockTime">--:--<span class="sec">--</span></div>
    <div class="clock-date" id="clockDate">—</div>
  </div>

  <!-- ===== Wecker ===== -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Wecker</span>
      <button class="toggle" id="alarmToggle"><span class="knob"></span></button>
    </div>
    <input type="time" class="time-input" id="alarmTime" value="07:00">
    <div class="sound-row" data-group="alarm">
      <button class="sound-btn active" data-sound="angelus">🔔 Angelusläuten</button>
      <button class="sound-btn" data-sound="hahn">🐓 Hahnenschrei</button>
    </div>
    <button class="preview-btn" data-preview="alarm">Ton vorhören</button>
    <div class="status-line" id="alarmStatus"></div>
  </div>

  <!-- ===== Timer ===== -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Timer</span>
    </div>
    <div id="timerSetup">
      <div class="timer-inputs">
        <input type="number" id="timerMin" min="0" max="599" value="10" inputmode="numeric">
        <span class="colon">:</span>
        <input type="number" id="timerSec" min="0" max="59" value="0" inputmode="numeric">
      </div>
      <div class="timer-labels"><span>Minuten</span><span class="colon-space"></span><span>Sekunden</span></div>
    </div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="sound-row" data-group="timer">
      <button class="sound-btn active" data-sound="angelus">🔔 Angelusläuten</button>
      <button class="sound-btn" data-sound="hahn">🐓 Hahnenschrei</button>
    </div>
    <button class="preview-btn" data-preview="timer">Ton vorhören</button>
    <div class="action-row">
      <button class="action-btn primary" id="timerStartBtn">Start</button>
      <button class="action-btn ghost" id="timerResetBtn">Zurücksetzen</button>
    </div>
    <div class="status-line" id="timerStatus"></div>
  </div>

  <p class="hint">Hinweis: Wecker und Timer funktionieren, solange diese Seite geöffnet ist.<br>
  Der Bildschirm wird automatisch wachgehalten, wenn etwas aktiv ist.</p>

</div>

<!-- Alarm-Overlay -->
<div class="alarm-overlay" id="alarmOverlay">
  <div class="alarm-icon" id="overlayIcon">🔔</div>
  <div class="alarm-title" id="overlayTitle">Wecker</div>
  <div class="alarm-sub" id="overlaySub">—</div>
  <button class="alarm-stop" id="stopBtn">Stopp</button>
</div>

  /* Wiedergabe ueber Web Audio (AudioContext) - dieselbe Technik wie die
     frueheren synthetischen Toene, die auf diesem Geraet nachweislich lief.
     Die MP3-Daten werden einmal dekodiert und dann als Puffer abgespielt. */
  let audioCtx = null;
  const decodedBuffers = {};
  let currentSource = null;
  let previewing = false;
  window.__weckerDebug = { decoded: [], playing: false, lastError: null };

  function ensureCtx(){
    if (!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function base64ToArrayBuffer(dataUri){
    const b64 = dataUri.split(",")[1];
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  function decodeSound(kind){
    return new Promise((resolve, reject) => {
      if (decodedBuffers[kind]) { resolve(decodedBuffers[kind]); return; }
      const ctx = ensureCtx();
      // Callback-Form fuer maximale Kompatibilitaet (aeltere Android-WebViews)
      ctx.decodeAudioData(
        base64ToArrayBuffer(SOUND_DATA[kind]),
        (buffer) => {
          decodedBuffers[kind] = buffer;
          window.__weckerDebug.decoded.push(kind);
          resolve(buffer);
        },
        (err) => {
          window.__weckerDebug.lastError = "decode:" + (err && err.message || err);
          reject(err);
        }
      );
    });
  }

  function stopSound(){
    if (currentSource){
      try { currentSource.stop(); } catch(e){}
      currentSource = null;
    }
    window.__weckerDebug.playing = false;
    previewing = false;
  }

  function playSound(kind, loop){
    const ctx = ensureCtx();
    stopSound();
    decodeSound(kind).then(buffer => {
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.loop = !!loop;
      src.connect(ctx.destination);
      src.onended = () => {
        if (currentSource === src){
          window.__weckerDebug.playing = false;
          previewing = false;
        }
      };
      src.start(0);
      currentSource = src;
      window.__weckerDebug.playing = true;
    }).catch(() => {});
  }

  /* ============ Ton-Auswahl & Vorhören ============ */
  const sounds = { alarm: "angelus", timer: "angelus" };
  document.querySelectorAll(".sound-row").forEach(row => {
    const group = row.dataset.group;
    row.querySelectorAll(".sound-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        row.querySelectorAll(".sound-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        sounds[group] = btn.dataset.sound;
        saveSettings();
      });
    });
  });
  document.querySelectorAll("[data-preview]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (previewing){ stopSound(); return; }
      playSound(sounds[btn.dataset.preview], false);
      previewing = true; // nach playSound setzen (playSound raeumt vorher auf)
    });
  });

  /* ============ Digitaluhr ============ */
  const WEEKDAYS = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  function p2(n){ return String(n).padStart(2,"0"); }

  function updateClock(){
    const n = new Date();
    document.getElementById("clockTime").innerHTML =
      p2(n.getHours()) + ":" + p2(n.getMinutes()) + '<span class="sec">' + p2(n.getSeconds()) + '</span>';
    document.getElementById("clockDate").textContent =
      WEEKDAYS[n.getDay()] + ", " + n.getDate() + ". " + MONTHS[n.getMonth()] + " " + n.getFullYear();
  }

  /* ============ Wake Lock ============ */
  let wakeLock = null;
  async function requestWakeLock(){
    try{ if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }catch(e){}
  }
  function releaseWakeLock(){
    if (wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
  }
  function syncWakeLock(){
    if (alarmOn || timerRunning) requestWakeLock(); else releaseWakeLock();
  }
  document.addEventListener("visibilitychange", () => {
    if ((alarmOn || timerRunning) && document.visibilityState === "visible") requestWakeLock();
  });

  /* ============ Alarm-Overlay & Klingel-Schleife ============ */
  function startRinging(kind, title, sub){
    document.getElementById("overlayIcon").textContent = kind === "hahn" ? "🐓" : "🔔";
    document.getElementById("overlayTitle").textContent = title;
    document.getElementById("overlaySub").textContent = sub;
    document.getElementById("alarmOverlay").classList.add("active");
    playSound(kind, true); // Aufnahme in Endlosschleife bis Stopp
    if (navigator.vibrate) navigator.vibrate([400,200,400]);
  }
  function stopRinging(){
    stopSound();
    document.getElementById("alarmOverlay").classList.remove("active");
    syncWakeLock();
  }
  document.getElementById("stopBtn").addEventListener("click", stopRinging);

  /* ============ Wecker ============ */
  let alarmOn = false;
  let alarmFiredForMinute = null;

  const alarmToggle = document.getElementById("alarmToggle");
  const alarmTimeInput = document.getElementById("alarmTime");
  const alarmStatus = document.getElementById("alarmStatus");

  function updateAlarmStatus(){
    if (alarmOn){
      alarmStatus.textContent = "Wecker gestellt auf " + alarmTimeInput.value + " Uhr.";
      alarmStatus.classList.add("armed");
    } else {
      alarmStatus.textContent = "";
      alarmStatus.classList.remove("armed");
    }
  }

  alarmToggle.addEventListener("click", () => {
    ensureCtx(); // Audio durch Nutzeraktion freischalten
    decodeSound(sounds.alarm).catch(()=>{}); // Ton vorab dekodieren
    alarmOn = !alarmOn;
    alarmToggle.classList.toggle("on", alarmOn);
    alarmFiredForMinute = null;
    updateAlarmStatus();
    syncWakeLock();
    saveSettings();
  });
  alarmTimeInput.addEventListener("change", () => {
    alarmFiredForMinute = null;
    updateAlarmStatus();
    saveSettings();
  });

  function checkAlarm(){
    if (!alarmOn) return;
    const n = new Date();
    const current = p2(n.getHours()) + ":" + p2(n.getMinutes());
    if (current === alarmTimeInput.value && alarmFiredForMinute !== current){
      alarmFiredForMinute = current;
      alarmOn = false;
      alarmToggle.classList.remove("on");
      updateAlarmStatus();
      saveSettings();
      startRinging(sounds.alarm, "Wecker", alarmTimeInput.value + " Uhr");
    }
  }

  /* ============ Timer (zeitstempelbasiert) ============ */
  let timerRunning = false;
  let timerEndsAt = 0;
  let timerPausedRemaining = null;

  const timerStartBtn = document.getElementById("timerStartBtn");
  const timerResetBtn = document.getElementById("timerResetBtn");
  const timerDisplay = document.getElementById("timerDisplay");
  const timerSetup = document.getElementById("timerSetup");
  const timerStatus = document.getElementById("timerStatus");

  function fmtT(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return p2(m) + ":" + p2(s);
  }

  function timerTick(){
    if (!timerRunning) return;
    const remaining = Math.max(0, Math.round((timerEndsAt - Date.now())/1000));
    timerDisplay.textContent = fmtT(remaining);
    if (remaining <= 0){
      timerRunning = false;
      timerPausedRemaining = null;
      timerStartBtn.textContent = "Start";
      timerSetup.style.display = "block";
      timerDisplay.classList.remove("active");
      timerStatus.textContent = "";
      syncWakeLock();
      startRinging(sounds.timer, "Timer", "Die Zeit ist abgelaufen");
    }
  }

  timerStartBtn.addEventListener("click", () => {
    ensureCtx();
    decodeSound(sounds.timer).catch(()=>{});
    if (timerRunning){
      // Pause
      timerPausedRemaining = Math.max(0, Math.round((timerEndsAt - Date.now())/1000));
      timerRunning = false;
      timerStartBtn.textContent = "Weiter";
      timerStatus.textContent = "Pausiert bei " + fmtT(timerPausedRemaining) + ".";
      syncWakeLock();
      return;
    }
    let seconds;
    if (timerPausedRemaining !== null){
      seconds = timerPausedRemaining;
      timerPausedRemaining = null;
    } else {
      const m = parseInt(document.getElementById("timerMin").value,10)||0;
      const s = parseInt(document.getElementById("timerSec").value,10)||0;
      seconds = m*60 + s;
      if (seconds <= 0){ timerStatus.textContent = "Bitte eine Zeit einstellen."; return; }
      saveSettings();
    }
    timerEndsAt = Date.now() + seconds*1000;
    timerRunning = true;
    timerStartBtn.textContent = "Pause";
    timerSetup.style.display = "none";
    timerDisplay.classList.add("active");
    timerDisplay.textContent = fmtT(seconds);
    timerStatus.textContent = "";
    syncWakeLock();
  });

  timerResetBtn.addEventListener("click", () => {
    timerRunning = false;
    timerPausedRemaining = null;
    timerStartBtn.textContent = "Start";
    timerSetup.style.display = "block";
    timerDisplay.classList.remove("active");
    timerStatus.textContent = "";
    syncWakeLock();
  });

  /* ============ Einstellungen speichern ============ */
  const SETTINGS_KEY = "wecker_settings";
  function saveSettings(){
    try{
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        alarmTime: alarmTimeInput.value,
        alarmSound: sounds.alarm,
        timerSound: sounds.timer,
        timerMin: document.getElementById("timerMin").value,
        timerSec: document.getElementById("timerSec").value
      }));
    }catch(e){}
  }
  function loadSettings(){
    try{
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      if (s.alarmTime) alarmTimeInput.value = s.alarmTime;
      if (s.timerMin !== undefined) document.getElementById("timerMin").value = s.timerMin;
      if (s.timerSec !== undefined) document.getElementById("timerSec").value = s.timerSec;
      ["alarm","timer"].forEach(group => {
        const val = s[group + "Sound"];
        if (val){
          sounds[group] = val;
          const row = document.querySelector('.sound-row[data-group="' + group + '"]');
          row.querySelectorAll(".sound-btn").forEach(b => b.classList.toggle("active", b.dataset.sound === val));
        }
      });
    }catch(e){}
  }
  document.getElementById("timerMin").addEventListener("input", saveSettings);
  document.getElementById("timerSec").addEventListener("input", saveSettings);

  loadSettings();
  updateClock();
  setInterval(() => { updateClock(); checkAlarm(); timerTick(); }, 250);

})();
</script>
<script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body>
