<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refektorium</title><script src="shared-store.js"></script><style>
:root{
 --parch:#eee3cb;--parch2:#e4d4b3;--paper:#f8f1e2;--ink:#30271d;--muted:#6c5f50;
 --wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--gold2:#d4b36c;--sage:#617058;
 --wood:#5d3d2a;--night:#172033;--line:#d6c39c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
a{text-decoration:none;color:inherit}

header{position:relative;background:linear-gradient(135deg,#4d5f3e,var(--sage));color:#fff8e8;padding:34px 22px;text-align:center}
header h1{font-size:42px;margin:0 0 6px}header p{margin:0;color:#e4eadb}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20}
main{max-width:900px;margin:auto;padding:24px 18px 60px} .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#fffaf0;padding:12px;font:inherit}textarea{min-height:120px}
button{border:0;border-radius:999px;padding:11px 16px;background:var(--sage);color:#fff;font-weight:700;cursor:pointer}
.counter{font-size:44px;font-weight:700;color:var(--sage);margin:8px 0} .actions{display:flex;gap:9px;flex-wrap:wrap}
.note{padding:10px;border-left:4px solid var(--gold);background:#fffaf0;margin:8px 0;border-radius:8px}
@media(max-width:650px){.grid{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">

<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head>
<body><header><a class="back" href="index.html">←</a><h1>🍞 Refektorium</h1><p>Trinken, Fasten, Ernährung und Rezeptnotizen</p></header>
<main><div class="grid">
<section class="card"><h2>Wasser heute</h2><div class="counter" id="water">0 ml</div><div class="actions">
<button data-water="250">+250 ml</button><button data-water="500">+500 ml</button><button id="resetWater">Zurücksetzen</button></div></section>
<section class="card"><h2>Fastenfenster</h2><input id="fasting" placeholder="z. B. 20:00–12:00"><div class="actions"><button id="saveFast">Speichern</button></div><p id="fastSaved"></p></section>
<section class="card"><h2>Rezept- oder Ernährungsnotiz</h2><input id="noteTitle" placeholder="Titel"><textarea id="noteText" placeholder="Notiz, Zutaten oder Beobachtung"></textarea><button id="saveNote">Notiz speichern</button></section>
<section class="card"><h2>Meine Notizen</h2><div id="notes"></div></section>
</div></main>
<script>
const WK='digitales_kloster.water.v1',FK='digitales_kloster.fasting.v1',NK='digitales_kloster.foodnotes.v1';
function todayKey(){return new Date().toISOString().slice(0,10)}
function getWater(){try{const o=JSON.parse(localStorage.getItem(WK)||'{}');return o[todayKey()]||0}catch(e){return 0}}
function setWater(v){let o={};try{o=JSON.parse(localStorage.getItem(WK)||'{}')}catch(e){}o[todayKey()]=Math.max(0,v);localStorage.setItem(WK,JSON.stringify(o));document.getElementById('water').textContent=o[todayKey()]+' ml'}
document.querySelectorAll('[data-water]').forEach(b=>b.onclick=()=>setWater(getWater()+Number(b.dataset.water)));
document.getElementById('resetWater').onclick=()=>setWater(0);
document.getElementById('fasting').value=localStorage.getItem(FK)||'';
document.getElementById('saveFast').onclick=()=>{localStorage.setItem(FK,document.getElementById('fasting').value);document.getElementById('fastSaved').textContent='Gespeichert.'};
function notes(){try{return JSON.parse(localStorage.getItem(NK)||'[]')}catch(e){return[]}}
function renderNotes(){const x=document.getElementById('notes'),a=notes();x.innerHTML=a.length?'':'<p>Noch keine Notizen.</p>';a.slice().reverse().forEach(n=>{const d=document.createElement('div');d.className='note';d.innerHTML='<b>'+n.title+'</b><br>'+n.text.replace(/\n/g,'<br>');x.appendChild(d)})}
document.getElementById('saveNote').onclick=()=>{const t=document.getElementById('noteText');if(!t.value.trim())return;const a=notes();a.push({title:document.getElementById('noteTitle').value||'Notiz',text:t.value,at:new Date().toISOString()});localStorage.setItem(NK,JSON.stringify(a));t.value='';document.getElementById('noteTitle').value='';renderNotes()};
setWater(getWater());renderNotes();
</script>
<script>
(function(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR)return;
 const area=document.querySelector('textarea');
 if(!area)return;
 const btn=document.createElement('button');
 btn.type='button';btn.textContent='🎤 Spracheingabe';
 btn.style.cssText='border:0;border-radius:999px;padding:10px 15px;margin:8px 8px 8px 0;background:#3f5c68;color:white;font-weight:700;';
 area.parentNode.insertBefore(btn,area);
 let rec=null,active=false;
 btn.onclick=()=>{if(active&&rec){rec.stop();return}rec=new SR();rec.lang='de-DE';rec.interimResults=true;rec.continuous=false;let base=area.value;rec.onstart=()=>{active=true;btn.textContent='■ Aufnahme stoppen'};rec.onresult=e=>{let final='',interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?final+=t:interim+=t}area.value=(base+(base?' ':'')+final+interim).trim()};rec.onend=()=>{active=false;btn.textContent='🎤 Spracheingabe'};rec.onerror=()=>{active=false;btn.textContent='🎤 Spracheingabe'};rec.start()};
})();
</script>
<script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
