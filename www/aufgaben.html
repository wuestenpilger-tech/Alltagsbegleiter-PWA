<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aufgaben · Alltagsbegleiter</title><script src="shared-store.js"></script><style>:root{--p:#eee3cb;--paper:#f8f1e2;--c:#fffaf0;--w:#67202d;--w2:#46131d;--line:#d6c39c;--muted:#6c5f50;--sage:#617058}*{box-sizing:border-box}body{margin:0;background:var(--p);font-family:Georgia,serif;color:#30271d}header{position:relative;background:linear-gradient(135deg,var(--w2),var(--w));color:white;padding:32px;text-align:center}.back{position:absolute;left:16px;top:16px;width:44px;height:44px;border-radius:50%;background:#ffffff20;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center}main{max-width:900px;margin:auto;padding:20px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--c);font:inherit;margin-bottom:10px}textarea{min-height:100px}button{border:0;border-radius:999px;padding:11px 15px;background:var(--w);color:white;font-weight:700}.task{background:var(--c);border-left:4px solid var(--sage);padding:13px;border-radius:10px;margin:9px 0}.meta{color:var(--muted);font-size:12px}@media(max-width:600px){.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));

<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head><body><header><a class="back" href="index.html">←</a><h1>✅ Aufgaben</h1><p>Einmalig oder wiederkehrend</p></header><main><section class="card"><input id="title" placeholder="Aufgabe"><div class="row"><input id="date" type="date"><input id="time" type="time"></div><select id="recurrence"><option value="none">Einmalig</option><option value="daily">Täglich</option><option value="weekly">Wöchentlich</option><option value="monthly">Monatlich</option><option value="yearly">Jährlich</option></select><textarea id="notes" placeholder="Notizen"></textarea><button id="save">Aufgabe speichern</button></section><section class="card"><h2>Meine Aufgaben</h2><div id="list"></div></section></main><script>const KEY='alltagsbegleiter.aufgaben.v1';function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function render(){const a=load(),box=document.getElementById('list');box.innerHTML=a.length?'':'<p>Noch keine Aufgaben.</p>';a.forEach((x,i)=>{const d=document.createElement('div');d.className='task';d.innerHTML='<b>'+esc(x.title)+'</b><div class="meta">'+esc(x.date)+' '+esc(x.time)+' · '+esc(x.recurrence)+'</div><div>'+esc(x.notes)+'</div><p><button data-del="'+i+'">Löschen</button></p>';box.appendChild(d)})}date.value=new Date().toISOString().slice(0,10);save.onclick=()=>{if(!title.value.trim())return;const a=load();a.push({title:title.value.trim(),date:date.value,time:time.value,recurrence:recurrence.value,notes:notes.value.trim()});localStorage.setItem(KEY,JSON.stringify(a));title.value='';notes.value='';render()};document.addEventListener('click',e=>{if(e.target.dataset.del!==undefined){const a=load();a.splice(Number(e.target.dataset.del),1);localStorage.setItem(KEY,JSON.stringify(a));render()}});render();</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
