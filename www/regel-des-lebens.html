<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regel des Lebens</title><script src="shared-store.js"></script><style>
:root{
 --parch:#eee3cb;--parch2:#e5d4b1;--paper:#f8f1e2;--ink:#30271d;--muted:#6c5f50;
 --wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--gold2:#d4b36c;--sage:#617058;
 --wood:#5d3d2a;--night:#172033;--line:#d6c39c;--cream:#fffaf0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
a{text-decoration:none;color:inherit}

header{position:relative;background:linear-gradient(135deg,var(--wood),#3e281d);color:#fff8e8;padding:34px 22px;text-align:center}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20}
header h1{font-size:40px;margin:0 0 6px}header p{margin:0;color:#eadbc1}
main{max-width:900px;margin:auto;padding:24px 18px 60px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:block;margin-bottom:8px;color:var(--wine2);font-weight:700}
input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--cream);font:inherit}textarea{min-height:130px}
button{border:0;border-radius:999px;padding:12px 16px;background:var(--wine);color:#fff;font-weight:700;cursor:pointer}
.preview{background:var(--cream);border-left:4px solid var(--gold);padding:14px;border-radius:10px;line-height:1.6}
@media(max-width:600px){.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head>
<body><header><a class="back" href="index.html">←</a><h1>📜 Regel des Lebens</h1><p>Dein persönlicher Tagesrhythmus</p></header>
<main>
<section class="card"><div class="row"><div><label>Aufstehen</label><input id="wake" type="time"></div><div><label>Schlafenszeit</label><input id="sleep" type="time"></div></div></section>
<section class="card"><div class="row"><div><label>Morgengebet</label><input id="morning" type="time"></div><div><label>Abendgebet</label><input id="evening" type="time"></div></div></section>
<section class="card"><label>Bewegung / Training</label><input id="movement" placeholder="z. B. Nordic Walking am Nachmittag"></section>
<section class="card"><label>Eigene Leitgedanken</label><textarea id="notes" placeholder="Welche Regel soll deinen Tag tragen?"></textarea><button id="save">Speichern</button></section>
<section class="card"><h2>Meine Regel</h2><div class="preview" id="preview"></div></section>
</main>
<script>
const KEY='digitales_kloster.regel.v1';
const ids=['wake','sleep','morning','evening','movement','notes'];
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return {}}}
function render(){
 const d=load();ids.forEach(id=>document.getElementById(id).value=d[id]||'');
 document.getElementById('preview').innerHTML=
 '<b>Aufstehen:</b> '+(d.wake||'—')+'<br>'+
 '<b>Morgengebet:</b> '+(d.morning||'—')+'<br>'+
 '<b>Bewegung:</b> '+(d.movement||'—')+'<br>'+
 '<b>Abendgebet:</b> '+(d.evening||'—')+'<br>'+
 '<b>Schlafenszeit:</b> '+(d.sleep||'—')+'<br><br>'+
 (d.notes||'Noch keine Leitgedanken eingetragen.').replace(/\n/g,'<br>');
}
document.getElementById('save').onclick=()=>{const d={};ids.forEach(id=>d[id]=document.getElementById(id).value);localStorage.setItem(KEY,JSON.stringify(d));render()};
render();
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
