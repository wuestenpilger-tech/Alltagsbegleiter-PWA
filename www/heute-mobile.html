<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Heute · Mobile 2.0</title><script src="shared-store.js"></script>
<style>
:root{--parch:#eee3cb;--paper:#f8f1e2;--cream:#fffaf0;--wine:#67202d;--wine2:#46131d;--gold:#d4b36c;--ink:#30271d;--muted:#6c5f50;--line:#d6c39c}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--parch),#dfcba5);font-family:Georgia,'Times New Roman',serif;color:var(--ink);padding-bottom:25px}
header{position:relative;background:linear-gradient(135deg,var(--wine2),var(--wine));color:white;padding:28px 18px;text-align:center}.back{position:absolute;left:14px;top:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20;color:white;text-decoration:none}
main{padding:14px;max-width:700px;margin:auto}.hero,.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}.hero h1{margin:0 0 6px;color:var(--wine2);font-size:28px}.hero p{margin:0;color:var(--muted)}
.step{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--cream);border:1px solid var(--line);border-radius:13px;padding:13px;margin:9px 0;text-decoration:none;color:var(--ink)}.step b{color:var(--wine2)}.step span{font-size:12px;color:var(--muted)}
</style><script src="alltagsbegleiter-sync.js"></script><link rel="stylesheet" href="motorola-g55-mobile.css"><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">

<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {

<body><header><a class="back" href="index.html">←</a><h1>Heute</h1><p id="date"></p></header>
<main><section style="margin:12px;background:#fffaf0;border:2px solid #d4b36c;border-radius:16px;padding:14px"><h2 style="margin:0 0 10px;color:#46131d">Direkt eintragen · Version 16</h2><p style="display:grid;gap:8px"><a href="medikamente.html" style="padding:12px;border-radius:999px;background:#67202d;color:white;text-align:center;text-decoration:none;font-weight:700">💊 Medikament</a><a href="arzttermine.html" style="padding:12px;border-radius:999px;background:#3f5c68;color:white;text-align:center;text-decoration:none;font-weight:700">📅 Termin oder Geburtstag</a><a href="aufgaben.html" style="padding:12px;border-radius:999px;background:#617058;color:white;text-align:center;text-decoration:none;font-weight:700">✅ Aufgabe</a></p></section><section class="hero"><h1 id="greeting"></h1><p id="message"></p></section>
<section class="card"><h2>Dein Tagesweg</h2><div id="steps"></div></section></main>
<script>
const n=new Date(),h=n.getHours();document.getElementById('date').textContent=n.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
document.getElementById('greeting').textContent=h<12?'Guten Morgen, Walter':h<18?'Guten Tag, Walter':'Guten Abend, Walter';
document.getElementById('message').textContent='Nur das Wesentliche für heute – ohne Umwege.';
const steps=[
['🌅 Morgengebet','stundenbuch_tablet.html','Laudes'],
['📖 Heutige Lesung','spirituelle-bibliothek/index.html','Lectio'],
['💊 Medikamente','medikamente.html','Plan'],
['❤️ Vorsorge','vorsorge-mobile.html','Werte & Termine'],
['🔔 Moment der Stille','stille-mobile.html','1–20 Min.'],
['✍️ Schnellnotiz','schnellnotiz-mobile.html','Gedanken'],
['🌙 Abendabschluss','abendabschluss-mobile.html','3 Fragen']
];
const box=document.getElementById('steps');steps.forEach(x=>{const a=document.createElement('a');a.href=x[1];a.className='step';a.innerHTML='<b>'+x[0]+'</b><span>'+x[2]+'</span>';box.appendChild(a)});
</script><div style="position:fixed;right:14px;bottom:82px;display:flex;flex-direction:column;gap:8px;z-index:999"><a href="medikamente.html" style="padding:10px 14px;border-radius:999px;background:#67202d;color:white;text-decoration:none;font-weight:700">💊 Medikament</a><a href="arzttermine.html" style="padding:10px 14px;border-radius:999px;background:#3f5c68;color:white;text-decoration:none;font-weight:700">📅 Termin</a></div><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
