<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Schnellnotiz</title><script src="shared-store.js"></script>
<style>
:root{--parch:#eee3cb;--paper:#f8f1e2;--cream:#fffaf0;--wine:#67202d;--wine2:#46131d;--gold:#d4b36c;--line:#d6c39c}
*{box-sizing:border-box}body{margin:0;background:var(--parch);font-family:Georgia,'Times New Roman',serif}.back{position:fixed;left:14px;top:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20;color:white;text-decoration:none;z-index:2}
header{background:linear-gradient(135deg,var(--wine2),var(--wine));color:white;padding:28px 18px;text-align:center}main{padding:14px;max-width:700px;margin:auto}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px}input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--cream);font:inherit;margin-bottom:10px}textarea{min-height:220px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button{border:0;border-radius:999px;padding:12px;background:var(--wine);color:white;font-weight:700}.actions .mic{background:var(--gold);color:var(--wine2)}
.msg{margin-top:10px;color:#405735}
</style><script src="alltagsbegleiter-sync.js"></script><link rel="stylesheet" href="motorola-g55-mobile.css"><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head><body><a class="back" href="index.html">←</a><header><h1>🎤 Schnellnotiz</h1><p>Gedanken sofort ins Skriptorium</p></header>
<main><section class="card"><input id="title" placeholder="Überschrift (optional)"><textarea id="text" placeholder="Sprich oder schreibe deinen Gedanken …"></textarea><div class="actions"><button class="mic" id="mic">🎤 Sprechen</button><button id="save">Speichern</button></div><div class="msg" id="msg"></div></section></main>
<script>
const KEY='digitales_kloster.skriptorium.v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return []}}
document.getElementById('save').onclick=()=>{const t=document.getElementById('text');if(!t.value.trim())return;const a=load();a.push({title:document.getElementById('title').value.trim()||'Schnellnotiz',type:'Schnellnotiz',text:t.value.trim(),at:new Date().toISOString()});localStorage.setItem(KEY,JSON.stringify(a));t.value='';document.getElementById('title').value='';document.getElementById('msg').textContent='Im Skriptorium gespeichert.'};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const mic=document.getElementById('mic');
if(!SR){mic.disabled=true;mic.textContent='Sprache nicht verfügbar'}else{mic.onclick=()=>{const r=new SR();r.lang='de-DE';r.interimResults=true;let base=document.getElementById('text').value;r.onstart=()=>mic.textContent='■ Aufnahme';r.onresult=e=>{let f='',i='';for(let n=e.resultIndex;n<e.results.length;n++){const s=e.results[n][0].transcript;e.results[n].isFinal?f+=s:i+=s}document.getElementById('text').value=(base+(base?' ':'')+f+i).trim()};r.onend=()=>mic.textContent='🎤 Sprechen';r.start()}};
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
