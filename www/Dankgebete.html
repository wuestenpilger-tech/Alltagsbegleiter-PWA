<style>
  :root{
    --paper:#F4EEE1;

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);

  body{

    display:flex;

    flex-direction:column;
    align-items:center;
    justify-content:center;

    display:grid;

    width:100%;

    border:1px solid var(--rule);
    border-radius:8px;
    color:var(--ink);
    font-family:inherit;
    font-size:1.55rem;
    text-align:left;
    cursor:pointer;

  .nav-btn:active{
    background:var(--maroon);

  .nav-name{flex:1;}
  .nav-name small{
    display:block;
    font-size:1.02rem;
    color:var(--ink-soft);
    font-style:italic;
    margin-top:6px;
  }

  /* ---------- Reader screen ---------- */
  #reader{
    display:none;
    flex-direction:column;
    height:100vh;
  }
  #reader.active{display:flex;}
  #menu.hidden{display:none;}

  #reader-bar{
    display:flex;
    align-items:center;
    gap:16px;
    padding:26px 44px;
    background:var(--maroon-deep);
    color:var(--paper);
    position:sticky;
    top:0;
    z-index:5;
  }
  #back-btn{
    background:none;
    border:1px solid rgba(244,238,225,0.5);
    color:var(--paper);
    font-family:inherit;
    font-size:1.15rem;
    padding:11px 22px;
    border-radius:6px;
  }
  #back-btn:active{background:rgba(244,238,225,0.15);}
  #reader-title{
    font-size:1.6rem;
    letter-spacing:0.02em;
    flex:1;
    text-align:center;
    padding-right:96px;
  }

  #font-controls{
    display:flex;
    gap:10px;
    align-items:center;
    padding:14px 44px;
    background:var(--paper-deep);
    border-bottom:1px solid var(--rule);
  }
  #font-controls span{
    font-size:0.98rem;color:var(--ink-soft);margin-right:auto;font-style:italic;
  }
  .fbtn{
    border:1px solid var(--rule);background:var(--paper);color:var(--maroon-deep);
    border-radius:7px;width:44px;height:44px;font-size:1.15rem;font-family:inherit;
    cursor:pointer;
  }

  #reader-body{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:44px 60px 100px;
    max-width:840px;
    margin:0 auto;
    width:100%;
    white-space:pre-wrap;
    line-height:1.85;
  }
  #reader-body .cross{
    text-align:center;color:var(--gold);opacity:.85;margin:30px 0;font-size:1.5rem;
  }
  #reader-body .blessing{
    margin-top:38px;padding-top:24px;border-top:1px solid var(--rule);
    font-style:italic;text-align:center;font-size:1.08rem;color:var(--ink-soft);
  }
  #reader-body .blessing .note{
    display:block;margin-top:12px;font-size:0.9rem;font-style:normal;color:var(--gold);
  }
  .back-to-menu{
    position:fixed;top:18px;right:18px;z-index:80;
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;

body: `Vater, Gott und Schöpfer unseres Lebens ...
Betroffen von den Krisen und Katastrophen auf unserer Welt, sowie den damit verbundenen Schicksalen meiner Brüder und Schwestern, deiner geliebten Kinder, komme ich betend und bittend zu Dir.

Lass mich beten für jene, deren Leben durch diese Erfahrungen, schwer belastet wird. Gib ihnen die Möglichkeit der unterstützenden Erfahrung auf ihrem Weg durch Begleitung und Fürsorge ihrer Brüder und Schwestern. Schenke ihnen die Möglichkeit zu heilen, für sich und alle, mit denen sie in geschwisterlicher Liebe verbunden sind.

Sei allen Leidenden nahe, vor allem denen, die schwer erkrankt sind. Wache liebend über die, welche im Sterben liegen und bald vor dein Angesicht treten werden.

Stehe denen barmherzig und verzeihend zur Seite, die du für sie völlig unerwartet, heute zu dir rufen wirst. Tröste mit deiner Liebe all jene, die trauern oder verzweifelt sind, weil sie geliebte Menschen verloren haben oder in naher Zukunft verlieren werden.

Schenke unseren Ärzten, unseren Pflegenden, unseren Forschern, Weisheit, Energie und Kraft, für ihre Arbeit zum Wohle der Menschheit.

Schenke jenen, die ihre Mitmenschen unterstützen, versorgen, betreuen oder begleiten, Kraft und Ausdauer für dieses große Werk der Nächstenliebe, für die große Verantwortung, die sie damit für sich und andere übernehmen.

Gib unseren Politkern, den Mächtigen unserer Welt, Klarheit, Einsicht und Weitsicht, so das sie jederzeit die richtigen Entscheidungen, für das Wohl der ihnen anvertrauten Mitmenschen treffen.

Hilf ihnen den Frieden in sich selbst, in ihrem Gegenüber immer wieder zu suchen, suchen zu wollen, ihn mit all ihren Möglichkeiten zu bewahren, ihn zum Wohle der ganzen Menschheit in friedvolle, in helfende, in unterstützende Handlungen umzusetzen zu wollen.

Mögen sie die friedliche Lösung aller Kriege und Konflikte dieser Welt, als ihre wichtigste und vordringlichste Aufgabe ansehen, diese Aufgabe ernsthaft und verantwortungsvoll anzunehmen und zum Wohle aller realisieren zu wollen.

Dankbar bete ich für alle, die durch ihre vielfältigen und unterschiedlichsten Tätigkeiten, die Versorgung und Sicherheit der Länder und Staaten auf der Welt aufrechterhalten.

Lass mich beten für alle, die durch das Erleben von Krisen und Katastrophen in Panik geraten, von ihren Ängsten überwältigt werden, hilf- oder ratlos dieser Erfahrung, diesem Erleben gegenüber stehen.

Lass mich beten für alle, welche materielle, körperliche oder seelische Schäden erleiden, erlitten haben, bzw. diese befürchten. Stelle ihnen Menschen an die Seite, die sie in diesen schwierigen Situationen auffangen, begleiten und unterstützen.

Lass mich beten für alle die in Isolations- oder Untersuchungshaft, die in Straf- und Umerziehungslagern, in Gefängnissen, oftmals unter menschenunwürdigen Umständen leben und leiden müssen.

Lass mich beten für meine Brüder und Schwestern, die auf unserer Welt Hunger und Armut ausgesetzt sind.

Lass mich beten für alle, die krankheitsbedingt oder aus anderen Gründen unter Quarantäne stehen. Für alle, die sich einsam fühlen, die einsam sind, die niemanden an ihrer Seite haben der ihnen hilft, der für sie da ist oder sie in welcher Form auch immer, unterstützt.

Tröste und begleite unsere behinderten Brüder und Schwestern. In den Einrichtungen, in denen sie leben und arbeiten, oder in ihrem häuslichen Umfeld. Unsere Brüder und Schwestern die gepflegt werden müssen, entweder in ihrer häuslichen Umgebung oder in unseren Pflege- und Senioreneinrichtungen.

Begleite unsere akut und chronisch Erkrankten in unseren Krankenhäusern, in psychiatrischen Kliniken, in unseren Rehabilitationseinrichtungen.

Tröste und begleite unsere Kinder, unsere Heranwachsenden, welche in unterschiedlichen Wohnformen leben und arbeiten, sowie alle die in sozialen Einrichtungen betreut, begleitet, leben und arbeiten. Berühre sie mit Deiner Sanftheit. Gib ihnen die Gewissheit, das wir Kraft deiner Liebe, immer mit ihnen in geschwisterlicher Liebe verbunden sind und sein werden.

Lass mich beten um deine Fürsorge und Unterstützung für unsere Hilfs- und Katastrophendienste. Für die vielen freiwilligen und ehrenamtlichen Helfer, für alle, die unterstützend uns und anderen auf der Welt, mit großem Engagement in vielen Krisen beistehen.

Mögen sie den, von uns an sie gestellten, sowie den an sich selbst gestellten Anforderungen gerecht werden können, ohne dabei durch ihre Unterstützung, selber zu erkranken oder darunter zu leiden.

Gib ihnen die Kraft, die Stärke, sich in ihrer eigenen Bedürftigkeit an- und wahrnehmen zu können, so das sie rechtzeitig andere, um Hilfe und Unterstützung für sich selber bitten können.

Lass mich beten für alle, die dein Sohn unter seinen besonderen Schutz gestellt hat. Für unsere Kinder, die mit ihnen verbundenen Familien. Beschütze und begleite sie mit all deiner Liebe, Gnade und Barmherzigkeit.

Bewahre sie vor jedweder Gewalt, vor Missbrauch in jeglicher Form, vor Hass und Leid, vor Zwietracht und Missgunst untereinander, oder der Erfahrung dessen durch ihre Mitmenschen.

Schütze ihre empfindsamen Seelen, ihre verletzlichen Körper, damit sie nie den Kontakt und das Vertrauen zu dir verlieren. Gib ihnen die Kraft, die Stärke, sich in ihrer eigenen Bedürftigkeit wahrzunehmen, sich anzunehmen, rechtzeitig selbst andere um Hilfe oder Unterstützung zu bitten. Stell ihnen Menschen an die Seite, die ihnen in diesen schwierigen Situationen glauben, sie begleiten und auffangen.

Lass mich beten für alle Brüder und Schwestern in unseren Gefängnissen und Sicherheitseinrichtungen, welche wegen unterschiedlicher Straftaten an ihren Mitmenschen, zeitweise oder ein Leben lang, zu ihrem und unserem Schutz, begleitet und betreut werden.

Lass mich beten für all jene, deren Taten noch im Dunkeln liegen, die nicht den Mut hatten oder haben, sich dazu zu bekennen.

Zeige ihnen Wege und Möglichkeiten der Lösung für ihr Tun oder Nicht-Tun. Gib ihnen Menschen an die Seite, die ihnen helfen, die richtigen Entscheidungen für sich, und die durch ihre Handlungen Betroffenen zu treffen.

Lass mich insbesondere beten für jene Täter / - innen, die durch ihre besondere gesellschaftliche Stellung, ihre damit verbundenen Aufgaben, ihre dadurch entstandene Verantwortung anderen gegenüber, für die, welche in deiner Nachfolge stehen, sich durch dich berufen fühlten und fühlen, sofern sie durch ihr Handlungen der eigenen Teilnahme oder der Duldung dessen, schwere und schwerste Schuld, in unterschiedlichster Form auf sich geladen haben.

Steh ihnen mit deiner Liebe, Gnade und Barmherzigkeit, auf ihrem weiteren Lebensweg bei, so schwer dieses Kreuz auch für sie werden wird oder ist.

Bitte nimm die durch ihre Taten betroffenen Opfer, in welcher Form auch immer sie durch die Täter / - innen und ihre Taten traumatisiert wurden, unter deinen ganz besonderen Schutz, deine ganz besondere Fürsorge und Liebe.

Bitte nimm ebenfalls jene, die sich am Rande unserer Gesellschaft, als Obdachlose, Heimatlose, Suchende und Umherirrende, halt- und hoffnungslos durch unsere Welt bewegen, liebevoll unter deine Obhut.

Lass die Zahl der von all diesen Ereignissen betroffenen Mitmenschen abnehmen. Lass sie zurückkehren zu dir, sofern sie dich auf ihrem Lebensweg, verloren haben. Zu der ihnen vertrauten Normalität, zu ihren eigenen Lebensentwürfen, ihren Wünschen und Vorstellungen, ihren Hoffnungen, ihrem Vertrauen und Glauben in dich.

Sehnsuchtsvoll bitte ich um eine weltweite Eindämmung aller Konflikte, der durch uns verursachten Katastrophen, Krisen und Kriege auf deiner Erde.

Mache mich, mach uns, dankbar für jeden Tag den wir gesund miteinander verbringen dürfen.

Lass uns nie vergessen, dass unser Leben, ein zerbrechliches Geschenk deiner Liebe und Gnade ist. Wir sind sterbliche Wesen, müssen immer wieder neu lernen unsere Grenzen zu akzeptieren, deine Grenzen zu respektieren, dir jeden Moment unseres Lebens immer wieder neu zu vertrauen.

Du allein bist ewig, Ursprung und Ziel von allem, immer liebend.

Gemeinsam im Vertrauen auf Deine unendliche Barmherzigkeit, deine Liebe, deine Unterstützung für uns, werden wir den an uns gestellten Herausforderungen, mit Achtung und Liebe voreinander, unserem Leben miteinander, als deine geliebten Kinder, verbunden mit dem Respekt vor deiner Schöpfung, begegnen können.

Vater, Herr und Bruder aller Menschen, deine Gegenwart vertreibt in uns jede Furcht, sie schenkt uns Zuversicht, öffnet uns füreinander, macht uns aufmerksam, achtsam und mitfühlend.

Dein Herz ist gütig und demütig, eine erfrischende Quelle des Friedens, der Liebe und deiner unendlichen Barmherzigkeit.

Maria, Mutter unseres Herrn, alle heiligen Frauen und Männer, Nothelfer und Schutzpatrone unseres Landes, bittet für mich und für uns alle ! Amen.

Vater, in der Einheit mit deinem Sohn Jehoschua
und dem Heiligen Geist,
ich lege mein,
unser Leben,
in eure,
in deine Hände.

Aber, nicht mein Wille, nicht unser Wille,
sondern dein, euer Wille, geschehe.`

fastentag: {
title: "Gebet am Fastentag",
body: `Maria, unsere Mutter bittet uns …
Mittwochs und Freitags streng zu fasten
und jeden Tag den Rosenkranz zu beten.

Vater, du Schöpfer der ganzen Welt, mein Schöpfer!
Ich danke dir, das du diese Welt, mit allem was sie ausmacht, für uns erschaffen hast.

Danke, das du den Boden unserer Erde in ganz unterschiedlicher Weise fruchtbar machst, damit er in vielfältiger Form, Nahrung für uns alle hervorbringen kann.

Danke, das du meinen Körper so gebildet hast, das er diese Nahrung aufnehmen und verwerten kann. Das sie mich mit allen wichtigen Nährstoffen für mein Leben versorgt, so das mein Körper wachsen kann. Hierdurch ist es mir möglich deinem Willen zu folgen, dir zu dienen.

Danke, für alle Menschen, die oftmals mühevoll durch ihre tägliche Arbeit, neue Möglichkeiten des Lebens für uns alle auf deiner Erde schaffen.

Durch dieses Fasten, diese andere Form meines Gebetes, bitte ich dich jene, die in ihren eigenen, oft ungelösten und kräftezehrenden Konflikten leben, weil sie nur noch sehen, was sie sehen wollen, was sie haben, haben wollen, für andere und deren Nöte und Probleme blind geworden sind.

Hilf mir durch dieses Fasten, dich als meinen Schöpfer, meine Brüder und Schwestern als deine Kinder, besser verstehen, besser zu sehen und wahrzunehmen.

Durch das Fasten möge die Sehnsucht, die Liebe zu dir, zu meinen Nächsten, immer mehr in mir wachsen.

body: `Jehoschua, Sohn des Vaters …
Mir ist bewußt, dass Du mich sehr liebst und mein Glück möchtest.

Deine große Gnade, deine unendliche Barmherzigkeit, hat meine Sünden, durch deinen Tod am Kreuz, von mir genommen.

Meine Sünden zugedeckt mit deinem Blut. Meine große, meine übergroße Schuld, die ich durch eigene Schwäche und Unbeständigkeit auf mich geladen habe, hast du für immer getilgt.

Bitte schenke mir immer wieder deine Gnade, für diesen Schritt der Selbstannahme und Vergebung.

Alles durch deine allumfassende Barmherzigkeit, deine unendliche Liebe und deine unermessliche Gnade mir gegenüber.

Im Vertrauen auf diese Gnaden, die mir den Zugang zu dir öffnen, bin ich erfüllt von Dankbarkeit und Hingabe.

Wie Du mir verziehen hast, möchte ich allen verzeihen, die mir Leid zugefügt, mich verwundet, mich abgelehnt, mich verabscheut, enttäuscht oder schlecht behandelt haben.

Ich entbinde sie von aller Schuld mir gegenüber, sofern dies alles in unserem gemeinsamen Leben vorgekommen ist, Einfluss auf mein Leben und meine Entwicklung genommen hat, oder noch nimmt.

let fontSize = 1.2;

function openPrayer(key){
  const p = prayers[key];
  document.getElementById('menu').classList.add('hidden');
  const reader = document.getElementById('reader');
  reader.classList.add('active');
  document.getElementById('reader-title').textContent = p.title;

  const body = document.getElementById('reader-body');
  body.innerHTML = p.body.replace(/†/g,'<div class="cross">✝</div>') +
    (key !== 'fastentag' ?
      '<div class="blessing">' + BLESSING + '<span class="note">' + BLESSING_NOTE + '</span></div>'
      : '');

  applyFont();
  body.scrollTop = 0;
}

function showMenu(){
  document.getElementById('reader').classList.remove('active');
  document.getElementById('menu').classList.remove('hidden');
}

function changeFont(delta){
  fontSize = Math.min(1.6, Math.max(0.8, fontSize + delta*0.1));
  applyFont();
}

function applyFont(){
  document.getElementById('reader-body').style.fontSize = fontSize + 'rem';
}

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> openPrayer(btn.dataset.target));
});
