<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Medikamente · Alltagsbegleiter</title><script src="shared-store.js"></script><style>:root{--p:#eee3cb;--paper:#f8f1e2;--c:#fffaf0;--w:#67202d;--w2:#46131d;--rose:#9b4b4b;--line:#d6c39c;--muted:#6c5f50}*{box-sizing:border-box}body{margin:0;background:var(--p);font-family:Georgia,serif;color:#30271d}header{position:relative;background:linear-gradient(135deg,var(--rose),var(--w2));color:white;padding:32px;text-align:center}.back{position:absolute;left:16px;top:16px;width:44px;height:44px;border-radius:50%;background:#ffffff20;color:white;text-decoration:none;display:flex;align-items:center;justify-content:center}main{max-width:900px;margin:auto;padding:20px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--c);font:inherit;margin-bottom:10px}textarea{min-height:90px}button{border:0;border-radius:999px;padding:11px 15px;background:var(--rose);color:white;font-weight:700}.item{background:var(--c);border-left:4px solid var(--rose);padding:13px;border-radius:10px;margin:9px 0}.meta{color:var(--muted);font-size:12px}@media(max-width:600px){.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">

<link rel="apple-touch-icon" href="icon-192.png">

<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head><body><header><a class="back" href="vorsorgezentrum.html">←</a><h1>💊 Medikamente</h1><p>Plan mit Uhrzeiten und Erinnerungen</p></header><main><section class="card"><div class="row"><input id="name" placeholder="Medikament"><input id="dose" placeholder="Dosierung"></div><input id="time" placeholder="Uhrzeit(en), z. B. 08:00 oder 08:00, 20:00"><select id="rhythm"><option>Täglich</option><option>Bei Bedarf</option><option>Wöchentlich</option><option>Anderer Rhythmus</option></select><textarea id="notes" placeholder="Hinweise"></textarea><button id="save">Speichern</button></section><section class="card"><h2>Mein Plan</h2><div id="list"></div><p class="meta">Erinnerungen erscheinen in der Startansicht eine Stunde nach der geplanten Zeit, solange die Einnahme noch nicht bestätigt wurde. Browser-Benachrichtigungen funktionieren zuverlässig, solange die App geöffnet ist.</p></section></main><script>
(() => {
  'use strict';
  const KEY='digitales_kloster.medikamente.v1';
  const $=id=>document.getElementById(id);
  const form={name:$('name'),dose:$('dose'),time:$('time'),rhythm:$('rhythm'),notes:$('notes'),save:$('save'),list:$('list')};
  let editIndex=-1;
  function load(){try{const v=JSON.parse(localStorage.getItem(KEY)||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
  function store(v){localStorage.setItem(KEY,JSON.stringify(v));window.dispatchEvent(new Event('storage'));}
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function clear(){form.name.value='';form.dose.value='';form.time.value='';form.rhythm.value='Täglich';form.notes.value='';editIndex=-1;form.save.textContent='Speichern';form.name.focus();}
  function render(){
    const items=load(); form.list.innerHTML='';
    if(!items.length){form.list.innerHTML='<p>Noch keine Medikamente.</p>';return;}
    items.forEach((x,i)=>{
      const d=document.createElement('div'); d.className='item';
      d.innerHTML=`<b>${esc(x.name)}</b><div class="meta">${esc(x.dose||'Keine Dosierung')} · ${esc(x.time||'Keine Uhrzeit')} · ${esc(x.rhythm||'Täglich')}</div><div>${esc(x.notes||'')}</div><p><button type="button" data-edit="${i}">Bearbeiten</button> <button type="button" data-del="${i}">Entfernen</button></p>`;
      form.list.appendChild(d);
    });
  }
  form.save.addEventListener('click',()=>{
    const name=form.name.value.trim();
    if(!name){alert('Bitte zuerst den Namen des Medikaments eintragen.');form.name.focus();return;}
    const items=load();
    const item={name,dose:form.dose.value.trim(),time:form.time.value.trim(),rhythm:form.rhythm.value,notes:form.notes.value.trim(),updatedAt:new Date().toISOString()};
    if(editIndex>=0) items[editIndex]=item; else items.push(item);
    store(items); clear(); render(); alert('Medikament wurde gespeichert.');
  });
  document.addEventListener('click',e=>{
    const edit=e.target.closest('[data-edit]');
    const del=e.target.closest('[data-del]');
    if(edit){const i=Number(edit.dataset.edit),x=load()[i];if(!x)return;editIndex=i;form.name.value=x.name||'';form.dose.value=x.dose||'';form.time.value=x.time||'';form.rhythm.value=x.rhythm||'Täglich';form.notes.value=x.notes||'';form.save.textContent='Änderungen speichern';window.scrollTo({top:0,behavior:'smooth'});}
    if(del){const i=Number(del.dataset.del);if(!confirm('Dieses Medikament wirklich entfernen?'))return;const items=load();items.splice(i,1);store(items);if(editIndex===i)clear();render();}
  });
  render();
})();
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
