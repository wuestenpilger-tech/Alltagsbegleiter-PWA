<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Impfungen</title><script src="shared-store.js"></script><style>
:root{
 --parch:#eee3cb;--parch2:#e5d4b1;--paper:#f8f1e2;--ink:#30271d;--muted:#6c5f50;
 --wine:#67202d;--wine2:#46131d;--gold:#b58a3d;--gold2:#d4b36c;--sage:#617058;
 --wood:#5d3d2a;--night:#172033;--line:#d6c39c;--cream:#fffaf0;--rose:#9b4b4b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--parch);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
a{text-decoration:none;color:inherit}

header{position:relative;background:linear-gradient(135deg,#6e805f,var(--sage));color:#fff8e8;padding:34px 22px;text-align:center}
.back{position:absolute;left:18px;top:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff20}
main{max-width:900px;margin:auto;padding:24px 18px 60px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
input{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--cream);font:inherit;margin-bottom:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:0;border-radius:999px;padding:11px 16px;background:var(--sage);color:#fff;font-weight:700}
.item{background:var(--cream);border-left:4px solid var(--sage);padding:13px;border-radius:10px;margin:10px 0}.meta{font-size:12px;color:var(--muted)}
@media(max-width:650px){.row{grid-template-columns:1fr}}</style><script src="alltagsbegleiter-sync.js"></script><script src="native-alarm.js"></script><link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alltagsbegleiter">
<script>
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
</script>
<link rel="stylesheet" href="alltagsbegleiter-stability.css">
</head>
<body><header><a class="back" href="vorsorgezentrum.html">←</a><h1>💉 Impfungen</h1><p>Dokumentation und Auffrischungstermine</p></header>
<main><section class="card"><input id="name" placeholder="Impfung"><div class="row"><input id="date" type="date"><input id="next" type="date"></div><input id="notes" placeholder="Präparat / Hinweise"><button id="save">Speichern</button></section>
<section class="card"><h2>Impfungen</h2><div id="list"></div></section></main>
<script>
const KEY='digitales_kloster.impfungen.v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return []}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){const a=load(),box=document.getElementById('list');box.innerHTML=a.length?'':'<p>Noch keine Impfungen.</p>';a.forEach((x,i)=>{const d=document.createElement('div');d.className='item';d.innerHTML='<b>'+esc(x.name)+'</b><div class="meta">Erhalten: '+esc(x.date)+' · Auffrischung: '+esc(x.next||'—')+'</div><div>'+esc(x.notes)+'</div><p><button data-del="'+i+'">Entfernen</button></p>';box.appendChild(d)})}
document.getElementById('date').value=new Date().toISOString().slice(0,10);
document.getElementById('save').onclick=()=>{const n=document.getElementById('name');if(!n.value.trim())return;const a=load();a.push({name:n.value.trim(),date:document.getElementById('date').value,next:document.getElementById('next').value,notes:document.getElementById('notes').value.trim()});localStorage.setItem(KEY,JSON.stringify(a));n.value='';document.getElementById('next').value='';document.getElementById('notes').value='';render()};
document.addEventListener('click',e=>{if(e.target.dataset.del!==undefined){const a=load();a.splice(Number(e.target.dataset.del),1);localStorage.setItem(KEY,JSON.stringify(a));render()}});
render();
</script><script src="android-file-bridge.js"></script>
<script src="alltagsbegleiter-stability.js"></script>
</body></html>
